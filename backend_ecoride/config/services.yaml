# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    email_domain: '%env(USER_EMAIL_DOMAIN)%'
    admin_default_password: '%env(ADMIN_DEFAULT_PASSWORD)%'

    mcs.base_url: '%env(MCS_BASE_URL)%'
    mcs.api_prefix: '%env(MCS_API_PREFIX)%'
    mcs.api_token: '%env(MCS_API_TOKEN)%'
    mcs.domain_uuid: '%env(MCS_DOMAIN_UUID)%'

    mcs.contact_from_email: '%env(MCS_CONTACT_FROM_EMAIL)%'
    mcs.contact_from_name: '%env(MCS_CONTACT_FROM_NAME)%'
    mcs.contact_to_email: '%env(MCS_CONTACT_TO_EMAIL)%'
    mcs.contact_to_name: '%env(MCS_CONTACT_TO_NAME)%'
    mcs.contact_return_path: '%env(MCS_CONTACT_RETURN_PATH)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\EventListener\ValidationExceptionListener:
        public: true
        tags:
            - { name: kernel.event_listener, event: kernel.exception }

    App\EventListener\PendingSettlementExceptionListener:
        public: true
        tags:
            - { name: kernel.event_listener, event: kernel.exception }

    App\EventListener\DriveTransitionExceptionListener:
        public: true
        tags:
            - { name: kernel.event_listener, event: kernel.exception }

    App\EventListener\DriveReferenceListener:
        tags:
            - { name: doctrine.event_listener, event: prePersist }

    App\Command\CreateAdminCommand:
        arguments:
            $defaultPassword: '%admin_default_password%'
        tags: 
            - console.command

    App\Service\StringHelper:
        arguments:
            $emailDomain: '%email_domain%'


    # MCS Client configuration
    App\Service\Mcs\McsClient:
        arguments:
            $mcsBaseUrl: '%mcs.base_url%'
            $mcsApiPrefix: '%mcs.api_prefix%'
            $mcsApiToken: '%mcs.api_token%'

    App\Service\Mcs\McsUserService:
        arguments:
            $mcsDomainUuid: '%mcs.domain_uuid%'

    # Contact MAIL
    App\Service\Contact\ContactService:
        arguments:
            $mcsContactFromEmail: '%mcs.contact_from_email%'
            $mcsContactFromName: '%mcs.contact_from_name%'
            $mcsContactToEmail: '%mcs.contact_to_email%'
            $mcsContactToName: '%mcs.contact_to_name%'
            $mcsContactReturnPath: '%mcs.contact_return_path%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
